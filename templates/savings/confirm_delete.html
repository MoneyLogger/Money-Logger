{% load currency_filters %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Goal - Money Logger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(to bottom right, #eff6ff, #faf5ff, #fce7f3); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 400px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h2 { font-size: 1.25rem; font-weight: 700; color: #111827; margin-bottom: 0.5rem; }
        p { color: #6b7280; font-size: 0.875rem; margin-bottom: 1.5rem; }
        .actions { display: flex; gap: 0.75rem; }
        .btn { flex: 1; padding: 0.75rem; border-radius: 0.75rem; font-weight: 600; font-size: 0.875rem; text-decoration: none; border: none; cursor: pointer; text-align: center; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: #f3f4f6; color: #374151; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">{{ goal.icon }}</div>
        <h2>Delete "{{ goal.title }}"?</h2>
        <p>This will also remove all transaction history for this goal. This action cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <div class="actions">
                <a href="{% url 'saving_dashboard' %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-danger">Delete</button>
            </div>
        </form>
    </div>
</body>
</html>
