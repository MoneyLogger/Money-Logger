<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/media/logo/logo.png">
    <title>Reset Password - Money Logger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(to bottom right, #eff6ff, #faf5ff, #fce7f3); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.2); width: 100%; max-width: 420px; padding: 40px; position: relative; overflow: hidden; }
        .container::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #2563eb, #7c3aed); }
        .logo { text-align: center; margin-bottom: 26px; }
        .logo h1 { font-size: 1.6rem; font-weight: 700; color: #2c3e50; margin-bottom: 8px; }
        .logo p { color: #7f8c8d; font-size: 0.9rem; line-height: 1.5; }
        .logo .email { color: #4f46e5; font-weight: 600; white-space: nowrap; }

        .msg { padding: 11px 14px; border-radius: 9px; margin-bottom: 14px; font-size: 0.88rem; font-weight: 500; }
        .msg.error { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; }
        .msg.success { background: #d1fae5; border: 1px solid #a7f3d0; color: #065f46; }
        .msg.info { background: #dbeafe; border: 1px solid #bfdbfe; color: #1e40af; }

        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #34495e; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e1e8ed; border-radius: 12px; font-size: 1rem; transition: all 0.25s ease; background: #fff; }
        .form-group input:focus { outline: none; border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.12); }

        .otp-input { text-align: center; font-size: 1.7rem; font-weight: 700; letter-spacing: 0.5rem; text-indent: 0.5rem; font-family: 'Courier New', monospace; color: #0f172a; }

        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 45px !important; }
        .toggle-pass { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 4px; color: #95a5a6; display: flex; align-items: center; }
        .toggle-pass:hover { color: #2563eb; }

        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #2563eb, #7c3aed); color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.25s ease; margin-top: 8px; -webkit-tap-highlight-color: transparent; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(124,58,237,0.3); }
        .btn:active { transform: translateY(0); }

        .resend-row { text-align: center; margin-top: 18px; font-size: 0.86rem; color: #64748b; }
        .resend-form { display: inline; }
        .resend-btn { background: none; border: none; color: #4f46e5; font-weight: 600; font-size: 0.86rem; cursor: pointer; padding: 0; }
        .resend-btn:hover:not(:disabled) { text-decoration: underline; }
        .resend-btn:disabled { color: #cbd5e1; cursor: not-allowed; }

        .back-link { text-align: center; margin-top: 18px; font-size: 0.88rem; }
        .back-link a { color: #2563eb; text-decoration: none; font-weight: 500; }
        .back-link a:hover { text-decoration: underline; }

        /* Tablet */
        @media (min-width: 481px) and (max-width: 1024px) { .container { max-width: 440px; } }
        /* Mobile */
        @media (max-width: 480px) {
            body { padding: 14px; align-items: flex-start; padding-top: 36px; }
            .container { padding: 30px 22px; }
            .logo h1 { font-size: 1.4rem; }
            .logo .email { white-space: normal; overflow-wrap: anywhere; }
            .form-group input { padding: 13px 14px; font-size: 16px; }
            .otp-input { font-size: 1.5rem; letter-spacing: 0.4rem; text-indent: 0.4rem; }
            .btn { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/media/logo/logo.png" alt="Logo" style="height:64px;margin-bottom:10px;">
            <h1>Reset Password</h1>
            <p>Enter the code sent to<br><span class="email">{{ masked_email }}</span> and your new password.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
            <div class="msg {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post" id="resetForm">
            {% csrf_token %}
            <div class="form-group">
                <label for="otp">Verification Code</label>
                <input type="text" name="otp" id="otp" class="otp-input" inputmode="numeric" autocomplete="one-time-code"
                       pattern="[0-9]*" maxlength="6" placeholder="••••••" autofocus required>
            </div>
            <div class="form-group">
                <label for="new_password1">New Password</label>
                <div class="password-wrapper">
                    <input type="password" name="new_password1" id="new_password1" placeholder="At least 8 characters" required>
                    <button type="button" class="toggle-pass" onclick="togglePass('new_password1', this)" tabindex="-1">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-group">
                <label for="new_password2">Confirm New Password</label>
                <div class="password-wrapper">
                    <input type="password" name="new_password2" id="new_password2" placeholder="Re-enter new password" required>
                    <button type="button" class="toggle-pass" onclick="togglePass('new_password2', this)" tabindex="-1">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn">Reset Password</button>
        </form>

        <div class="resend-row">
            Didn't get the code?
            <form method="post" class="resend-form">
                {% csrf_token %}
                <input type="hidden" name="action" value="resend">
                <button type="submit" class="resend-btn" id="resendBtn">Resend code</button>
            </form>
            <span id="resendTimer"></span>
        </div>

        <div class="back-link">
            <a href="{% url 'forgot_password' %}">← Use a different email</a>
        </div>
    </div>
    <script>
        function togglePass(id, btn) {
            const inp = document.getElementById(id);
            if (!inp) return;
            const isPass = inp.type === 'password';
            inp.type = isPass ? 'text' : 'password';
            btn.innerHTML = isPass
                ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        }

        // Numeric-only OTP box.
        (function () {
            var input = document.getElementById('otp');
            if (input) input.addEventListener('input', function () {
                this.value = this.value.replace(/\D/g, '').slice(0, 6);
            });
        })();

        // Resend cooldown countdown.
        (function () {
            var remaining = parseInt("{{ resend_remaining|default:0 }}", 10) || 0;
            var btn = document.getElementById('resendBtn');
            var timer = document.getElementById('resendTimer');
            if (!btn || !timer) return;
            function tick() {
                if (remaining <= 0) { btn.disabled = false; timer.textContent = ''; return; }
                btn.disabled = true; timer.textContent = ' (' + remaining + 's)';
                remaining -= 1; setTimeout(tick, 1000);
            }
            tick();
        })();
    </script>
</body>
</html>
