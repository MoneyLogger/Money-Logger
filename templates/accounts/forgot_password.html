<!DOCTYPE html>
<html lang="en" data-theme="corporate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/media/logo/logo.png">
    <title>Forgot Password - Money Logger</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background: linear-gradient(to bottom right, #eff6ff, #faf5ff, #fce7f3); }
        .brand-gradient { background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); }
        .brand-text { background: linear-gradient(to right, #2563eb, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .glass-card { background: rgba(255,255,255,0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3); }
        .top-bar::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #2563eb, #7c3aed); }
        .form-input-field { width: 100%; padding: 0.875rem 1rem; border: 2px solid #e5e7eb; border-radius: 0.75rem; font-size: 1rem; transition: all 0.2s; background: white; }
        .form-input-field:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .pass-field { padding-right: 2.75rem !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-5">
    <div class="glass-card relative top-bar w-full max-w-md rounded-2xl shadow-2xl p-10 overflow-hidden">
        <div class="text-center mb-8">
            <img src="/media/logo/logo.png" alt="Logo" class="h-[70px] mx-auto mb-3">
            <h1 class="text-3xl font-bold brand-text">Reset Password</h1>
            <p class="text-base-content/60 text-sm mt-1">Enter your username and set a new password</p>
        </div>

        {% if messages %}
        {% for message in messages %}
        <div class="alert {% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %} text-sm mb-4">
            <span>{{ message }}</span>
        </div>
        {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-control mb-4">
                <label class="label"><span class="label-text font-semibold">Username</span></label>
                <input type="text" name="username" id="username" placeholder="Enter your username" value="{{ username|default:'' }}" required class="form-input-field">
            </div>
            <div class="form-control mb-4">
                <label class="label"><span class="label-text font-semibold">New Password</span></label>
                <div class="relative">
                    <input type="password" name="new_password1" id="new_password1" placeholder="At least 8 characters" required class="form-input-field pass-field">
                    <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-base-content/40 hover:text-primary" onclick="togglePass('new_password1', this)" tabindex="-1">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <div class="form-control mb-6">
                <label class="label"><span class="label-text font-semibold">Confirm New Password</span></label>
                <div class="relative">
                    <input type="password" name="new_password2" id="new_password2" placeholder="Re-enter new password" required class="form-input-field pass-field">
                    <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-base-content/40 hover:text-primary" onclick="togglePass('new_password2', this)" tabindex="-1">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn brand-gradient text-white border-0 w-full h-12 text-base font-semibold hover:opacity-90 hover:-translate-y-0.5 transition-all">Reset Password</button>
        </form>

        <div class="text-center mt-5">
            <a href="{% url 'login' %}" class="text-primary text-sm font-medium hover:underline">← Back to Login</a>
        </div>
    </div>
    <script>
        function togglePass(id, btn) {
            const inp = document.getElementById(id);
            if (!inp) return;
            const isPass = inp.type === 'password';
            inp.type = isPass ? 'text' : 'password';
            btn.innerHTML = isPass
                ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        }
    </script>
</body>
</html>
