<style>
    .mobile-nav {
        position: fixed; bottom: 0; left: 0; right: 0;
        background: rgba(255,255,255,.94);
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        border-top: 1px solid rgba(229,231,235,.6);
        box-shadow: 0 -2px 12px rgba(30,30,60,.07);
        z-index: 50; display: none;
    }
    .mobile-nav-inner {
        display: flex; align-items: center; justify-content: space-around;
        padding: .375rem 0 .25rem;
    }
    .mobile-nav-item {
        display: flex; flex-direction: column; align-items: center; gap: .2rem;
        padding: .5rem .875rem; border-radius: .75rem;
        text-decoration: none; color: #9ca3af;
        font-size: .6875rem; font-weight: 600;
        border: none; background: transparent; cursor: pointer;
        transition: color .15s;
    }
    .mobile-nav-item svg { width: 20px; height: 20px; }
    .mobile-nav-item:hover { color: #374151; }
    .mobile-nav-item.active { color: #4f46e5; }

    /* bottom sheet */
    .mobile-sheet-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.42); backdrop-filter: blur(4px);
        z-index: 200; display: none; align-items: flex-end;
    }
    .mobile-sheet-overlay.active { display: flex; }
    .mobile-sheet {
        width: 100%; background: #fff;
        border-radius: 1.5rem 1.5rem 0 0;
        padding: 1.25rem 1.25rem 2rem;
        animation: sheetUp .28s ease-out;
        max-height: 82vh; overflow-y: auto;
    }
    @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .sheet-handle {
        width: 2.5rem; height: 4px; border-radius: 999px;
        background: #e5e7eb; margin: 0 auto 1.25rem;
    }
    .sheet-header {
        display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem;
    }
    .sheet-header h3 { font-size: 1.125rem; font-weight: 700; color: #111827; }
    .sheet-close {
        width: 2rem; height: 2rem; border-radius: .5rem;
        background: #f3f4f6; border: none; cursor: pointer;
        display: flex; align-items: center; justify-content: center; color: #6b7280;
        transition: background .15s;
    }
    .sheet-close:hover { background: #e5e7eb; }

    .sheet-user {
        display: flex; align-items: center; gap: .875rem;
        padding: .875rem 1rem; border-radius: 1rem;
        background: linear-gradient(135deg, #eef2ff, #f5f3ff);
        margin-bottom: .75rem;
    }
    .sheet-avatar {
        width: 2.75rem; height: 2.75rem; border-radius: 50%; flex-shrink: 0;
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-weight: 700; font-size: 1.0625rem;
    }
    .sheet-uname { font-size: .9375rem; font-weight: 700; color: #111827; }
    .sheet-email { font-size: .75rem; color: #9ca3af; }

    .sheet-divider { height: 1px; background: #f3f4f6; margin: .5rem 0; }

    .sheet-item {
        display: flex; align-items: center; gap: .875rem;
        padding: .8125rem 1rem; border-radius: .875rem;
        font-size: .9375rem; font-weight: 500; color: #374151;
        text-decoration: none; width: 100%; border: none;
        background: transparent; text-align: left; cursor: pointer;
        transition: background .13s, color .13s;
    }
    .sheet-item:hover { background: #f3f4f6; color: #111827; }
    .sheet-item.active { background: #eef2ff; color: #4f46e5; }
    .sheet-item svg { width: 1.375rem; height: 1.375rem; flex-shrink: 0; }
    .sheet-item.danger { color: #ef4444; }
    .sheet-item.danger:hover { background: #fef2f2; color: #dc2626; }

    @media (max-width: 768px) { .mobile-nav { display: block; } }
</style>

<nav class="mobile-nav">
    <div class="mobile-nav-inner">
        <a href="{% url 'dashboard' %}" class="mobile-nav-item {% if active_page == 'dashboard' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
            Dashboard
        </a>
        <a href="{% url 'survival' %}" class="mobile-nav-item {% if active_page == 'survival' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"/></svg>
            Survival
        </a>
        <a href="{% url 'analytics' %}" class="mobile-nav-item {% if active_page == 'analytics' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
            Analytics
        </a>
        <a href="{% url 'budget_list' %}" class="mobile-nav-item {% if active_page == 'budget' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            Budget
        </a>
        <button class="mobile-nav-item {% if active_page == 'more' or active_page == 'notes' or active_page == 'savings' or active_page == 'activity_log' %}active{% endif %}"
                onclick="openSheet()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
            More
        </button>
    </div>
</nav>

<!-- Bottom sheet -->
<div class="mobile-sheet-overlay" id="mobileSheetOverlay" onclick="closeSheet()">
    <div class="mobile-sheet" onclick="event.stopPropagation()">
        <div class="sheet-handle"></div>
        <div class="sheet-header">
            <h3>More</h3>
            <button class="sheet-close" onclick="closeSheet()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <div class="sheet-user">
            <div class="sheet-avatar">{{ request.user.username|first|upper }}</div>
            <div>
                <div class="sheet-uname">{{ request.user.username }}</div>
                <div class="sheet-email">{{ request.user.email }}</div>
            </div>
        </div>

        <div class="sheet-divider"></div>

        <a href="{% url 'notes_list' %}" class="sheet-item {% if active_page == 'notes' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Notes
        </a>
        <a href="{% url 'saving_dashboard' %}" class="sheet-item {% if active_page == 'savings' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg>
            Savings
        </a>
        <a href="{% url 'activity_log' %}" class="sheet-item {% if active_page == 'activity_log' %}active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Activity Log
        </a>
        <a href="{% url 'export_data' %}" class="sheet-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export Excel
        </a>

        <div class="sheet-divider"></div>

        <a href="{% url 'logout' %}" class="sheet-item danger">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
        </a>
    </div>
</div>

<script>
function openSheet()  { document.getElementById('mobileSheetOverlay').classList.add('active'); }
function closeSheet() { document.getElementById('mobileSheetOverlay').classList.remove('active'); }

/* keep old names working in case any page still calls them */
function toggleMobileSettings() { openSheet(); }
function closeMobileSettings()  { closeSheet(); }
</script>
