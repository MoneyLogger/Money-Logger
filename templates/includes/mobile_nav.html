<style>
/* Mobile Navigation */
.mobile-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); backdrop-filter: blur(24px); border-top: 1px solid rgba(255,255,255,0.2); box-shadow: 0 -4px 6px rgba(0,0,0,0.05); z-index: 50; display: none; }
.mobile-nav-inner { display: flex; align-items: center; justify-content: space-around; padding: 8px 0; }
.mobile-nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 16px; border-radius: 12px; transition: all 0.2s; text-decoration: none; color: #6b7280; min-width: 60px; border: none; background: transparent; cursor: pointer; }
.mobile-nav-item:hover { color: #374151; }
.mobile-nav-item.active { color: #2563eb; }
.mobile-nav-item svg { width: 20px; height: 20px; }
.mobile-nav-item span { font-size: 0.75rem; font-weight: 500; }

/* Mobile Settings Modal */
.mobile-settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: flex-end; animation: fadeIn 0.2s ease-out; }
.mobile-settings-overlay.active { display: flex; }
.mobile-settings-modal { width: 100%; background: white; border-radius: 1.5rem 1.5rem 0 0; padding: 1.5rem; animation: slideUpModal 0.3s ease-out; max-height: 80vh; overflow-y: auto; }
@keyframes slideUpModal { from { transform: translateY(100%); } to { transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.mobile-settings-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.mobile-settings-header h3 { font-size: 1.25rem; font-weight: 700; color: #111827; }
.close-btn { width: 2rem; height: 2rem; border-radius: 0.5rem; background: #f3f4f6; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
.close-btn:hover { background: #e5e7eb; }
.close-btn svg { width: 1.25rem; height: 1.25rem; color: #6b7280; }
.mobile-settings-content { display: flex; flex-direction: column; gap: 0.5rem; }
.mobile-settings-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; border-radius: 0.75rem; font-size: 1rem; font-weight: 500; color: #374151; text-decoration: none; transition: all 0.2s; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; }
.mobile-settings-item:hover { background: rgba(59,130,246,0.1); color: #2563eb; }
.mobile-settings-item svg { width: 1.5rem; height: 1.5rem; color: currentColor; }
.mobile-settings-divider { height: 1px; background: #e5e7eb; margin: 0.5rem 0; }
.mobile-settings-item.logout-item { color: #ef4444; }
.mobile-settings-item.logout-item:hover { background: rgba(239,68,68,0.1); color: #dc2626; }
@media (max-width: 768px) {
    .mobile-nav { display: block; }
}
</style>

<nav class="mobile-nav">
    <div class="mobile-nav-inner">
        <a href="{% url 'dashboard' %}" class="mobile-nav-item{% if active_page == 'dashboard' %} active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="9"></rect>
                <rect x="14" y="3" width="7" height="5"></rect>
                <rect x="14" y="12" width="7" height="9"></rect>
                <rect x="3" y="16" width="7" height="5"></rect>
            </svg>
            <span>Dashboard</span>
        </a>
        <a href="{% url 'survival' %}" class="mobile-nav-item{% if active_page == 'survival' %} active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"></path>
            </svg>
            <span>Survival</span>
        </a>
        <a href="{% url 'analytics' %}" class="mobile-nav-item{% if active_page == 'analytics' %} active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="20" x2="12" y2="10"></line>
                <line x1="18" y1="20" x2="18" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="16"></line>
            </svg>
            <span>Analytics</span>
        </a>
        <a href="{% url 'budget_list' %}" class="mobile-nav-item{% if active_page == 'budget' %} active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="16"></line>
                <line x1="8" y1="12" x2="16" y2="12"></line>
            </svg>
            <span>Budget</span>
        </a>
        <button class="mobile-nav-item{% if active_page == 'more' %} active{% endif %}" onclick="toggleMobileSettings()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="5" r="1.5"/>
                <circle cx="12" cy="12" r="1.5"/>
                <circle cx="12" cy="19" r="1.5"/>
            </svg>
            <span>More</span>
        </button>
    </div>
</nav>

<div class="mobile-settings-overlay" id="mobileSettingsOverlay" onclick="closeMobileSettings()">
    <div class="mobile-settings-modal" onclick="event.stopPropagation()">
        <div class="mobile-settings-header">
            <h3>More Options</h3>
            <button onclick="closeMobileSettings()" class="close-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="mobile-settings-content">
            <div style="display:flex;align-items:center;gap:1rem;padding:1rem;background:linear-gradient(to right,rgba(219,234,254,0.5),rgba(233,213,255,0.5));border-radius:0.75rem;margin-bottom:0.5rem;">
                <div style="width:3rem;height:3rem;border-radius:50%;background:linear-gradient(to bottom right,#3b82f6,#9333ea);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <span style="color:white;font-weight:700;font-size:1.25rem;">{{ request.user.username|first|upper }}</span>
                </div>
                <div style="min-width:0;">
                    <p style="font-weight:700;font-size:1rem;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ request.user.username }}</p>
                    <p style="font-size:0.875rem;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ request.user.email }}</p>
                </div>
            </div>
            <div class="mobile-settings-divider"></div>
            <a href="{% url 'notes_list' %}" class="mobile-settings-item{% if active_page == 'notes' %} active" style="background: rgba(59,130,246,0.1); color: #2563eb;{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <path d="M14 2v6h6"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                <span>Notes</span>
            </a>
            <a href="{% url 'saving_dashboard' %}" class="mobile-settings-item{% if active_page == 'savings' %} active" style="background: rgba(59,130,246,0.1); color: #2563eb;{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2 1Z"/>
                    <path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/>
                    <path d="M12 18V6"/>
                </svg>
                <span>Savings</span>
            </a>
            <a href="{% url 'activity_log' %}" class="mobile-settings-item{% if active_page == 'activity_log' %} active" style="background: rgba(59,130,246,0.1); color: #2563eb;{% endif %}">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                    <polyline points="10 9 9 9 8 9"/>
                </svg>
                <span>Activity Log</span>
            </a>
            <button onclick="{% if export_csv_function %}exportTransactions();{% else %}window.location.href='{% url 'dashboard' %}'{% endif %} closeMobileSettings();" class="mobile-settings-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                <span>Export CSV</span>
            </button>
            <div class="mobile-settings-divider"></div>
            <a href="{% url 'logout' %}" class="mobile-settings-item logout-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>Logout</span>
            </a>
        </div>
    </div>
</div>

<script>
function toggleMobileSettings() {
    const overlay = document.getElementById('mobileSettingsOverlay');
    overlay.classList.add('active');
}

function closeMobileSettings() {
    const overlay = document.getElementById('mobileSettingsOverlay');
    overlay.classList.remove('active');
}
</script>
