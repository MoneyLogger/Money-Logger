<style>
.mobile-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.92); backdrop-filter: blur(24px); border-top: 1px solid rgba(229,231,235,0.5); box-shadow: 0 -4px 6px rgba(0,0,0,0.05); z-index: 50; display: none; }
.mobile-settings-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 200; display: none; align-items: flex-end; }
.mobile-settings-overlay.active { display: flex; }
.mobile-settings-modal { width: 100%; background: white; border-radius: 1.5rem 1.5rem 0 0; padding: 1.5rem; animation: slideUpModal 0.3s ease-out; max-height: 80vh; overflow-y: auto; }
@keyframes slideUpModal { from { transform: translateY(100%); } to { transform: translateY(0); } }
@media(max-width: 768px) { .mobile-nav { display: block; } }
</style>

<nav class="mobile-nav">
    <div class="flex items-center justify-around px-1 py-2">
        <a href="{% url 'dashboard' %}" class="flex flex-col items-center gap-1 px-4 py-2 rounded-xl transition-all no-underline {% if active_page == 'dashboard' %}text-primary{% else %}text-base-content/50{% endif %}">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
            <span class="text-xs font-medium">Dashboard</span>
        </a>
        <a href="{% url 'survival' %}" class="flex flex-col items-center gap-1 px-4 py-2 rounded-xl transition-all no-underline {% if active_page == 'survival' %}text-primary{% else %}text-base-content/50{% endif %}">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"/></svg>
            <span class="text-xs font-medium">Survival</span>
        </a>
        <a href="{% url 'analytics' %}" class="flex flex-col items-center gap-1 px-4 py-2 rounded-xl transition-all no-underline {% if active_page == 'analytics' %}text-primary{% else %}text-base-content/50{% endif %}">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
            <span class="text-xs font-medium">Analytics</span>
        </a>
        <a href="{% url 'budget_list' %}" class="flex flex-col items-center gap-1 px-4 py-2 rounded-xl transition-all no-underline {% if active_page == 'budget' %}text-primary{% else %}text-base-content/50{% endif %}">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            <span class="text-xs font-medium">Budget</span>
        </a>
        <button class="flex flex-col items-center gap-1 px-4 py-2 rounded-xl transition-all border-none bg-transparent cursor-pointer {% if active_page == 'more' %}text-primary{% else %}text-base-content/50{% endif %}" onclick="toggleMobileSettings()">
            <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
            <span class="text-xs font-medium">More</span>
        </button>
    </div>
</nav>

<!-- Mobile Settings Bottom Sheet -->
<div class="mobile-settings-overlay" id="mobileSettingsOverlay" onclick="closeMobileSettings()">
    <div class="mobile-settings-modal" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between mb-5">
            <h3 class="text-xl font-bold">More Options</h3>
            <button onclick="closeMobileSettings()" class="btn btn-ghost btn-sm btn-square rounded-lg">
                <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <div class="flex items-center gap-4 p-4 rounded-xl bg-gradient-to-r from-blue-50 to-purple-50 mb-3">
            <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0" style="background: linear-gradient(to bottom right, #3b82f6, #9333ea);">
                <span class="text-white font-bold text-xl">{{ request.user.username|first|upper }}</span>
            </div>
            <div>
                <p class="font-bold text-base">{{ request.user.username }}</p>
                <p class="text-sm text-base-content/50">{{ request.user.email }}</p>
            </div>
        </div>
        <div class="divider my-1"></div>
        <a href="{% url 'notes_list' %}" class="flex items-center gap-4 p-4 rounded-xl text-base font-medium text-base-content hover:bg-primary/10 hover:text-primary transition-all no-underline {% if active_page == 'notes' %}bg-primary/10 text-primary{% endif %}">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            <span>Notes</span>
        </a>
        <a href="{% url 'saving_dashboard' %}" class="flex items-center gap-4 p-4 rounded-xl text-base font-medium text-base-content hover:bg-primary/10 hover:text-primary transition-all no-underline {% if active_page == 'savings' %}bg-primary/10 text-primary{% endif %}">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 18V6"/></svg>
            <span>Savings</span>
        </a>
        <a href="{% url 'activity_log' %}" class="flex items-center gap-4 p-4 rounded-xl text-base font-medium text-base-content hover:bg-primary/10 hover:text-primary transition-all no-underline {% if active_page == 'activity_log' %}bg-primary/10 text-primary{% endif %}">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span>Activity Log</span>
        </a>
        <a href="{% url 'export_data' %}" class="flex items-center gap-4 p-4 rounded-xl text-base font-medium text-base-content hover:bg-primary/10 hover:text-primary transition-all no-underline">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span>Export Excel</span>
        </a>
        <div class="divider my-1"></div>
        <a href="{% url 'logout' %}" class="flex items-center gap-4 p-4 rounded-xl text-base font-medium text-error hover:bg-error/10 transition-all no-underline">
            <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span>Logout</span>
        </a>
    </div>
</div>

<script>
function toggleMobileSettings() { document.getElementById('mobileSettingsOverlay').classList.add('active'); }
function closeMobileSettings() { document.getElementById('mobileSettingsOverlay').classList.remove('active'); }
</script>
